  <rect x="8" y="14" width="36" height="36" rx="3" stroke="#e8903a" stroke-width="1.8" fill="none"/>
  <!-- Slim depth line showing thinness -->
  <rect x="44" y="16" width="5" height="32" rx="2" stroke="#e8903a" stroke-width="1.4" fill="none"/>
