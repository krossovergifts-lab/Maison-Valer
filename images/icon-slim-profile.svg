  <line x1="52" y1="16" x2="52" y2="48" stroke="#c1440e" stroke-width="1.2" stroke-linecap="round"/>
  <path d="M49 19 L52 16 L55 19" stroke="#c1440e" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M49 45 L52 48 L55 45" stroke="#c1440e" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Surface texture -->
  <path d="M14 24 Q26 22 38 24" stroke="#9e8a75" stroke-width="0.8" stroke-linecap="round"/>
  <path d="M14 32 Q26 30 38 32" stroke="#9e8a75" stroke-width="0.8" stroke-linecap="round"/>
  <path d="M14 40 Q26 38 38 40" stroke="#9e8a75" stroke-width="0.8" stroke-linecap="round"/>
</svg>
